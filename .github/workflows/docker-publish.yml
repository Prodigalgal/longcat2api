name: Build and publish multi-arch image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: speedproxy/longcat2api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-40)
          echo "tags=${{ env.IMAGE_NAME }}:sha-${SHA_SHORT},${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # Optional: pin GitOps image tag when GITOPS_SSH_KEY is configured
      - name: Update GitOps image tag
        continue-on-error: true
        env:
          GITOPS_SSH_KEY: ${{ secrets.GITOPS_SSH_KEY }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${GITOPS_SSH_KEY:-}" ]; then
            echo "GITOPS_SSH_KEY not set; skip GitOps pin"
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$GITOPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone --depth 1 git@github.com:Prodigalgal/ircs-prod-config.git gitops
          FILE=gitops/longcat2api/oracle/kustomization.yaml
          if [ -f "$FILE" ]; then
            sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" "$FILE"
            cd gitops
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add longcat2api/oracle/kustomization.yaml
            git commit -m "chore(longcat2api): pin image ${IMAGE_TAG}" || exit 0
            git push origin HEAD:main
          fi
